version: 2

project_name: vctl

builds:
  - main: .
    binary: vctl
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/smallest-inc/velocity-cli/cmd.version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc

release:
  github:
    owner: smallest-inc
    name: velocity-cli
